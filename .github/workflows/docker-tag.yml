name: Build Docker Image on Tag

on:
  push:
    tags:
      - '*'

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show pushed ref

        run: |
          echo "Git ref is: $GITHUB_REF"

      - name: Extract tag name
        run: |
          echo "TAG=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t tag-docker-project:${TAG} -t tag-docker-project:latest .

      - name: Show built images
        run: |
          docker images | grep tag-docker-project
